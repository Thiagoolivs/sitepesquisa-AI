openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Data analysis operations
  - name: formulario
    description: Form builder operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analisar:
    post:
      operationId: analisar
      tags: [analysis]
      summary: Analyze numbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalisarInput"
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalisarResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /upload_csv:
    post:
      operationId: uploadCsv
      tags: [analysis]
      summary: Upload and analyze CSV file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                arquivo:
                  type: string
                  format: binary
              required:
                - arquivo
      responses:
        "200":
          description: Analysis of numeric values found in CSV
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalisarResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ia:
    post:
      operationId: iaAnalise
      tags: [analysis]
      summary: AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IaInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IaResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /formulario:
    post:
      operationId: salvarFormulario
      tags: [formulario]
      summary: Save a form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormularioInput"
      responses:
        "200":
          description: Form saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormularioResult"
    get:
      operationId: getFormulario
      tags: [formulario]
      summary: Get the saved form
      responses:
        "200":
          description: The saved form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormularioResult"
        "404":
          description: No form saved yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /formulario/responder:
    post:
      operationId: responderFormulario
      tags: [formulario]
      summary: Submit form responses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormRespostaInput"
      responses:
        "200":
          description: Responses recorded and analysis computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormRespostaResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /formulario/analise:
    get:
      operationId: getFormularioAnalise
      tags: [formulario]
      summary: Get statistical analysis of form numeric responses
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalisarResult"
        "404":
          description: No numeric responses yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalisarInput:
      type: object
      properties:
        numeros:
          type: array
          items:
            type: number
      required:
        - numeros
    AnalisarResult:
      type: object
      properties:
        media:
          type: number
        mediana:
          type: number
        moda:
          type: array
          items:
            type: number
        total:
          type: number
        count:
          type: integer
        min:
          type: number
        max:
          type: number
        desvio_padrao:
          type: number
      required:
        - media
        - mediana
        - moda
        - total
        - count
        - min
        - max
        - desvio_padrao
    IaInput:
      type: object
      properties:
        pergunta:
          type: string
        dados:
          $ref: "#/components/schemas/AnalisarResult"
      required:
        - pergunta
    IaResult:
      type: object
      properties:
        resposta:
          type: string
      required:
        - resposta
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    FormularioPergunta:
      type: object
      properties:
        id:
          type: string
        texto:
          type: string
        tipo:
          type: string
          enum: [texto, numerica, multipla]
        opcoes:
          type: array
          items:
            type: string
      required:
        - id
        - texto
        - tipo
    FormularioInput:
      type: object
      properties:
        titulo:
          type: string
        descricao:
          type: string
        perguntas:
          type: array
          items:
            $ref: "#/components/schemas/FormularioPergunta"
      required:
        - titulo
        - perguntas
    FormularioResult:
      type: object
      properties:
        titulo:
          type: string
        descricao:
          type: string
        perguntas:
          type: array
          items:
            $ref: "#/components/schemas/FormularioPergunta"
        total_respostas:
          type: integer
      required:
        - titulo
        - perguntas
        - total_respostas
    FormResposta:
      type: object
      properties:
        pergunta_id:
          type: string
        valor:
          type: string
      required:
        - pergunta_id
        - valor
    FormRespostaInput:
      type: object
      properties:
        respostas:
          type: array
          items:
            $ref: "#/components/schemas/FormResposta"
      required:
        - respostas
    FormRespostaResult:
      type: object
      properties:
        mensagem:
          type: string
        respostas_numericas:
          type: integer
        analise:
          $ref: "#/components/schemas/AnalisarResult"
      required:
        - mensagem
        - respostas_numericas
