openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Data analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analisar:
    post:
      operationId: analisar
      tags: [analysis]
      summary: Analyze numbers
      description: Calculates statistical metrics from a list of numbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalisarInput"
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalisarResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ia:
    post:
      operationId: iaAnalise
      tags: [analysis]
      summary: AI analysis
      description: Sends statistical data to an AI model and returns a textual analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IaInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IaResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalisarInput:
      type: object
      properties:
        numeros:
          type: array
          items:
            type: number
          description: List of numbers to analyze
      required:
        - numeros
    AnalisarResult:
      type: object
      properties:
        media:
          type: number
          description: Mean (average)
        mediana:
          type: number
          description: Median
        moda:
          type: array
          items:
            type: number
          description: Mode (most frequent values)
        total:
          type: number
          description: Sum of all numbers
        count:
          type: integer
          description: Count of numbers
        min:
          type: number
          description: Minimum value
        max:
          type: number
          description: Maximum value
        desvio_padrao:
          type: number
          description: Standard deviation
      required:
        - media
        - mediana
        - moda
        - total
        - count
        - min
        - max
        - desvio_padrao
    IaInput:
      type: object
      properties:
        pergunta:
          type: string
          description: User question or context for the AI
        dados:
          $ref: "#/components/schemas/AnalisarResult"
      required:
        - pergunta
    IaResult:
      type: object
      properties:
        resposta:
          type: string
          description: AI-generated analysis text
      required:
        - resposta
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
