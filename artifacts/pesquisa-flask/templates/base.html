{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesquisa AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=4" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
      <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
    </svg>
    Pesquisa AI
  </a>
  <span style="font-size:.72rem;font-weight:700;background:#2563eb;color:#fff;padding:.2rem .6rem;border-radius:99px;letter-spacing:.04em">v3.0</span>
  <div class="navbar-links">
    <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="/pesquisa" class="{% if active_page == 'pesquisa' %}active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
      Pesquisa
    </a>
    <a href="/ia" class="{% if active_page == 'ia' %}active{% endif %}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      IA
    </a>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(msg, type) {
  type = type || '';
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = (type === 'success' ? '✓ ' : type === 'error' ? '✕ ' : 'ℹ ') + msg;
  c.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}

function fmt(n) {
  return Number.isInteger(n) ? String(n) : parseFloat(n).toFixed(2);
}

function intensityColor(val, min, max) {
  if (max === min) return 'hsl(120,70%,42%)';
  const ratio = (val - min) / (max - min);
  const hue = Math.round(120 - ratio * 120);
  return 'hsl(' + hue + ',70%,42%)';
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
